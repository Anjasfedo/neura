name: neura

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build Flutter iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Fix Podfile and Install Pods
        run: |
          cd ios
          if [ ! -f "Podfile" ]; then
            echo "⚠️ Podfile tidak ditemukan! Membuat Podfile baru..."
            pod init
          fi
          rm -rf Pods
          rm -rf Podfile.lock
          pod repo update
          pod install
          cd ..

      - name: Build iOS App Bundle
        # Build without codesign, outputs a .app folder
        run: flutter build ios --release --no-codesign

      - name: Package into unsigned IPA
        # Create Payload folder, move .app inside, and zip it as an .ipa
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r neura-app.ipa Payload

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: neura-ios-ipa
          # Upload the nicely packaged .ipa file
          path: build/ios/iphoneos/neura-app.ipa
          if-no-files-found: error
